<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Clada Imagex | Free AI Image Generator</title>
    <meta name="description" content="Generate high-quality AI art for free with Clada Imagex. Use our fast AI image generator to turn text prompts into stunning visuals instantly.">
    <meta name="keywords" content="ai image generator, clada imagex, text to image ai, free ai art creator">
    
    <meta property="og:title" content="Clada Imagex - AI Image Generator">
    <meta property="og:description" content="Visualize your ideas instantly with Clada Imagex.">
    <meta property="og:type" content="website">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --bg: #000000;
            --border: rgba(168, 85, 247, 0.25);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- HYPER-UPGRADED HOME PAGE --- */
        #home-page {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at 50% 100%, #120520 0%, #000 80%);
            z-index: 2000; transition: all 1.2s cubic-bezier(0.8, 0, 0.1, 1);
            overflow: hidden;
        }

        /* Animated Grain/Noise Layer */
        #home-page::before {
            content: ""; position: absolute; inset: -100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15; pointer-events: none;
            animation: grainMove 20s linear infinite;
        }
        @keyframes grainMove { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }

        .home-center-group {
            position: relative; z-index: 10; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .home-subtitle {
            font-size: 10px; letter-spacing: 8px; text-transform: uppercase;
            color: var(--purple); font-weight: 600; margin-bottom: 20px;
            text-shadow: 0 0 10px var(--purple-glow);
            animation: fadeInDown 1.5s ease-out;
        }

        .home-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(38px, 12vw, 70px);
            letter-spacing: 20px; font-weight: 700;
            line-height: 1; text-indent: 20px;
            background: linear-gradient(180deg, #fff 40%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 60px;
            animation: heroZoom 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #enterBtn {
            background: rgba(255, 255, 255, 0.03); color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 22px 50px; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 5px;
            cursor: pointer; border-radius: 2px; backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #enterBtn:hover { 
            background: #fff; color: #000; border-color: #fff;
            transform: translateY(-5px); box-shadow: 0 0 30px var(--purple-glow);
        }

        /* --- MAIN APP INTERFACE --- */
        #app-page {
            display: flex; flex-direction: column; height: 100%;
            opacity: 0; transform: scale(1.1);
            transition: all 1.2s cubic-bezier(0.8, 0, 0.1, 1);
        }

        body.app-active #home-page { transform: scale(1.5); opacity: 0; pointer-events: none; }
        body.app-active #app-page { opacity: 1; transform: scale(1); }

        header { padding: 35px 40px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .brand { 
            font-family: 'Syncopate', sans-serif; font-size: 12px; letter-spacing: 6px; 
            color: var(--purple); text-shadow: 0 0 15px var(--purple-glow);
        }

        #feed {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; padding: 130px 20px 180px 20px;
            gap: 70px; scroll-behavior: smooth;
        }
        #feed::-webkit-scrollbar { width: 0; }

        .img-card {
            position: relative; width: 100%; max-width: 650px; flex-shrink: 0;
            background: #080808; border: 1px solid rgba(255,255,255,0.03);
            border-radius: 2px; box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .img-card img { width: 100%; height: auto; display: block; }

        .dl-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
        }

        .loader-box {
            width: 100%; max-width: 650px; height: 380px; flex-shrink: 0;
            background: #050505; border: 1px dashed rgba(168, 85, 247, 0.1);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .scan-line {
            position: absolute; width: 100%; height: 1px; background: var(--purple);
            box-shadow: 0 0 20px var(--purple); animation: scanning 2s infinite;
        }
        @keyframes scanning { 0%, 100% { top: 0; } 50% { top: 100%; } }

        .input-area { 
            width: 100%; padding: 0 30px 50px 30px; position: fixed; bottom: 0; 
            background: linear-gradient(0deg, #000 50%, transparent 100%);
            display: flex; justify-content: center; z-index: 1100;
        }
        .search-container { 
            position: relative; width: 100%; max-width: 750px; height: 100px; 
            background: rgba(10,10,10,0.9); backdrop-filter: blur(40px);
            border: 1px solid var(--border); display: flex; align-items: center; padding: 0 35px;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 19px; }

        #genBtn { 
            position: absolute; bottom: 15px; right: 15px; background: #fff; border: none; 
            width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
        }
        .btn-icon { width: 18px; height: 18px; stroke: #000; stroke-width: 4; fill: none; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes heroZoom { from { opacity: 0; transform: scale(1.1); letter-spacing: 40px; } to { opacity: 1; transform: scale(1); letter-spacing: 20px; } }
    </style>
</head>
<body>

<div id="home-page">
    <div class="home-center-group">
        <div class="home-subtitle">Andred AI</div>
        <h1 class="home-title">CLADA<br>IMAGEX</h1>
        <button id="enterBtn" onclick="enterApp()">Create</button>
    </div>
</div>

<div id="app-page">
    <header><div class="brand">CLADA</div></header>
    <main id="feed"></main>
    <div class="input-area">
        <div class="search-container">
            <input type="text" id="promptInput" placeholder="Visualize..." autocomplete="off">
            <button id="genBtn" onclick="generate()" aria-label="Generate Image">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 19V5M12 5L5 12M12 5L19 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'sk_wbQthv1A9ZgPABaCEs2nwISrtjvElZco';

function enterApp() {
    document.body.classList.add('app-active');
}

async function generate() {
    const input = document.getElementById('promptInput');
    const feed = document.getElementById('feed');
    const genBtn = document.getElementById('genBtn');
    const prompt = input.value.trim();
    if (!prompt) return;

    input.blur();
    genBtn.disabled = true;

    const loader = document.createElement('div');
    loader.className = 'loader-box';
    loader.innerHTML = `<div class="scan-line"></div>`;
    feed.appendChild(loader);
    loader.scrollIntoView({ behavior: 'smooth' });

    try {
        const seed = Math.floor(Math.random() * 1000000);
        const url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&model=flux&nologo=true`;

        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${API_KEY}`, 'Accept': 'image/*' }
        });

        const blob = await response.blob();
        const objectURL = URL.createObjectURL(blob);

        const card = document.createElement('div');
        card.className = 'img-card';
        card.innerHTML = `<img src="${objectURL}" alt="${prompt}">`;
        
        const dl = document.createElement('div');
        dl.className = 'dl-btn';
        dl.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;
        dl.onclick = () => saveAs(blob, `CLADA_${Date.now()}.jpg`);

        card.appendChild(dl);
        feed.replaceChild(card, loader);
        genBtn.disabled = false;
        
    } catch (err) {
        loader.innerHTML = `<span style="font-size:10px; color:#444">ERROR</span>`;
        genBtn.disabled = false;
    }
}

document.getElementById('promptInput').onkeypress = (e) => { if (e.key === 'Enter') generate(); };
</script>
</body>
</html>
